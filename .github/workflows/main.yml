# This is a basic workflow to help you get started with Actions

name: SFDX Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v2

      # Install SFDX CLI and authenticate
      - name: Salesforce SFDX CLI Setup
        uses: sfdx-actions/setup-sfdx@v1
        with:
          sfdx-auth-url: ${{ secrets.DEVHUB_URL }}

      # Set default Dev Hub
      - name: Set Default DevHub
        run: sfdx force:config:set defaultdevhubusername=test-cip5cl81f6zt@example.com

      # Sample step
      - name: Run a one-line script
        run: echo Hello, world!

      # Sample multi-line step
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
