    <lightning-card title="Child To Parent Using Simple Event">
     <!--div class="slds-m-around_medium" onclose={handleClick} in case of event bubbling--> 
        <div class="slds-m-around_medium">
             <lightning-button label="Open Modal" 
                variant="brand"
                onclick={handleOpen}></lightning-button>
                <h3>
                    {msg}

            <template if:true={isVisible}>
                <c-c2p-modaal-component 
                onclose={handleClick}></c-c2p-modaal-component>
            </template>
            
        </div>
    </lightning-card>
    
</template>
