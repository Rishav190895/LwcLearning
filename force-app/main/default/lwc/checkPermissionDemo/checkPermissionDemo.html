<template>
    <lightning-card title="User Permission Demo">
        <div class="slds-m-around_medium">
            <template if:true={hasViewAllDataAvailable}>
                <p>Hurray!! I have User Permission</p>
            </template>
             <template if:false={hasViewAllDataAvailable}>
                <p>Opps!! I Don't have User Permission</p>
            </template>
        </div>
        
    </lightning-card>

    <lightning-card title="Custom Permission Demo">
        <div class="slds-m-around_medium">
            <template if:true={hasCustomPermissionAvailable}>
                <p>Hurray!! I have Custom Permission</p>
            </template>
             <template if:false={hasCustomPermissionAvailable}>
                <p>Opps!! I Don't have Custom Permission</p>
            </template>
        </div>
        
    </lightning-card>

    <lightning-card title="Form Factor Demo">
        <p class="slds-m-around_medium"><strong>Form Factor is :</strong> {formFactor}</p>
    </lightning-card>

     <lightning-card title="Get User Information Demo">
        <div class="slds-m-around_medium">
            <strong>User Id is :</strong> {userId}
            <strong> isGuest :</strong> {isGuest}
        </div>
    </lightning-card>

     
</template>
