<template>
    <lightning-card title="Create Record Demo">
        <div class="slds-m-around_medium">
            <form class="reset">
                <lightning-input class="slds-m-bottom_x-small" label="First Name" name="FirstName" onchange={handleChange}></lightning-input>
                <lightning-input class="slds-m-bottom_x-small" label="Last Name" name="LastName" onchange={handleChange}></lightning-input>
                <lightning-input class="slds-m-bottom_x-small" label="Title" name="Title" onchange={handleChange}></lightning-input>
                <lightning-input class="slds-m-bottom_x-small" type="Tel" label="Phone" name="Phone" onchange={handleChange}></lightning-input>
                <lightning-input class="slds-m-bottom_x-small" type="Email" label="Email" name="Email" onchange={handleChange}></lightning-input>
                <lightning-button class="slds-m-bottom_x-small" label="Create Contact" variant="brand" onclick={handleClick}></lightning-button>

            </form>
        </div>
    </lightning-card>
</template>
