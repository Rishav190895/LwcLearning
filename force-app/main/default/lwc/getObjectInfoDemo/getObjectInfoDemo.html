<template>
    <lightning-card title="Get Object Api Adapter With Function">
        <div class="slds-m-around_medium">
           <p>DefaultRecordTypeId: {objectDetail}</p> 
        </div>
    </lightning-card>

    <lightning-card title="Get Object Api Adapter With Property">
        <div class="slds-m-around_medium">
            <template if:true={objectInfoProperty.data}>
                 <p>DefaultRecordTypeId: {objectInfoProperty.data.defaultRecordTypeId}</p>
                 <p>Object Name: {objectInfoProperty.data.apiName}</p> 
            </template>
          
        </div>
    </lightning-card>

     <lightning-card title="Get Object Api Infos Adapter">
        <div class="slds-m-around_medium">
            <template if:true={objectdata}>
                 <template for:each={objectdata.results} for:item="obj">
                <div key={obj.result.apiName}>
                    <p>Object Name:{obj.result.apiName}</p>
                     <p>Record Type: {obj.result.defaultRecordTypeId}</p>
                </div>          

            </template>
            </template>
           
        </div>
    </lightning-card>
</template>
