                       <!--Template Looping for:each-->

                       <lightning-card title="For Each Loop">
                        <div class="slds-m-around-medium">
                            <template for:each ={carlist} for:item="car">
                                <ul key={car} class="slds-has-dividers_around-space">
                                <li class="slds-item">{car}</li>
                                </ul>
                            </template>
                        </div>
                       </lightning-card>

                       <lightning-card title="For Each Loop with array of Object">
                        <div class="slds-m-around-medium">
                            <ul>
                            <template for:each ={bikeList} for:item="bike">
                                <div key={bike.id} class="slds-has-dividers_around-space">
                                <li class="slds-item">Name :{bike.name} Price: {bike.price}</li>
                                </div>
                            </template>
                            </ul>
                        </div>
                        
                       </lightning-card>

                        <!--Template Looping iterator-->

                        <lightning-card title="Iterator loop">
                            <div class="slds-m-around-medium">
                                <ul class="slds-has-dividers_around-space">
                                <template iterator:it={ceoList}>
                                    <div key={it.value.id}>
                                        <template if:true={it.first}>
                                            <h3>CEO LIST</h3> 
                                        </template>
                                        <li>Name: {it.value.name}
                                            Company : {it.value.company}
                                            Salary : {it.value.salary}</li>
                                            <template if:true={it.last}>
                                            <h3>Thanks And Regards</h3> 
                                        </template>

                                    </div>

                                </template>
                                </ul>

                            </div>
                        </lightning-card>
