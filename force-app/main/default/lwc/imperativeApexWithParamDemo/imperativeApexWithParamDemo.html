<template>
    <lightning-card title="Imperative Apex With Param Demo">
        <div class="slds-m-around_medium">
            <lightning-input
            label="Enter Account"
            type="search"
            onchange={handleChange}
            value={selectedData}>
        </lightning-input>
        <template if:true={accounts}>
            <template for:each={accounts} for:item="account">
                <div key={account.Id} class="slds-box">
                    <p><strong>Account Name : </strong>{account.Name}</p>
                    <p><strong>Type : </strong>{account.Type}</p>
                </div>
            </template>
        </template>
        </div>
    </lightning-card>
</template>
