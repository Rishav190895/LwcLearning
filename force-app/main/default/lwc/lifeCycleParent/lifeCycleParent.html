<template>
    <lightning-card title="Parent Life Cycle Card">
        <div class="slds-m-around_medium">
            <lightning-input type="text" onkeyup={handleChange}>
                {name}
            </lightning-input>

            <template if:false={isVisible}>
            <lightning-button
            variant="Brand"
            label="Show Child"
            title="Show Child"
            onclick={handleClick}
            class="slds-m-left_x-small">
            </lightning-button>
            </template>

            <template if:true={isVisible}>
            <lightning-button
            variant="Brand"
            label="Remove Child"
            title="Remove Child"
            onclick={handleClick}
            class="slds-m-left_x-small">
            </lightning-button>
            </template>

            <template if:true={isVisible}>
                <c-life-cycle-child></c-life-cycle-child>
            </template>
            
        </div>
    </lightning-card>
</template>
