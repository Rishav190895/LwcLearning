<template>
    <div class="slds-box slds-margin_around_medium">
        <div class="slds-text-heading_medium slds-text-align_center">
            <template if:true={mapMarkers.length}>
                  <lightning-map
                    map-markers={mapMarkers}
                    markers-title={markerTitle}
                    selected-marker-value={selectMarker}
                    onmarkerselect={callMarkerSelect}>
                </lightning-map>
            </template>
            <template if:false={mapMarkers.length}>
                <div class="slds-text-heading_small slds-text-align_center">
                    No Accounts Found
          
        </div>
        </template>
    </div>
    </div>
</template>
