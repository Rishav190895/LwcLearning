<template>
    <lightning-card title="Navigate To Object">
        <div class="slds-m-around_medium">
            <lightning-button variant="brand" label="Navigate to Object" 
            onclick={navigateToObject}></lightning-button>
        </div>
    </lightning-card>

     <lightning-card title="Navigate To Object With Default Values">
        <div class="slds-m-around_medium">
            <lightning-button variant="brand" label="Navigate to Object With Default Values" 
            onclick={navigateToObjectWithDafaultValue}></lightning-button>
        </div>
    </lightning-card>

     <lightning-card title="Navigate To ListView">
        <div class="slds-m-around_medium">
            <lightning-button variant="brand" label="Navigate to ListView" 
            onclick={navigateToListView}></lightning-button>
        </div>
    </lightning-card>

    <lightning-card title="Navigate To Files">
        <div class="slds-m-around_medium">
            <lightning-button variant="brand" label="Navigate to Files" 
            onclick={navigateToFiles}></lightning-button>
        </div>
    </lightning-card>
</template>
