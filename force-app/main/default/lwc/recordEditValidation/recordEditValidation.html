<template>
    <lightning-card title="Lightning Record Edit Form Using Validation">
        <div class="slds-m-around_medium">
            <lightning-record-edit-form
            object-api-name={objectName}
            onsubmit={handleSubmit}
            onsuccess={handleSuccess}
            onerror={handleError}>

            <lightning-input label="Enter Account Name"  class="slds-m-bottom_x-small"
             value={inputValue} onkeyup={handleChange}></lightning-input>

            <lightning-button label="Create Account" type="submit" class="slds-m-top_small" 
            variant="brand"></lightning-button>
            </lightning-record-edit-form>
        </div>
        
    </lightning-card>
</template>
