<template>
    <lightning-card title="SignOut Page">
        <div class="slds-m-around_medium">
            <h1 class="slds-m-bottom_medium slds-text-heading_medium"> Sign Out Page:</h1>
            <lightning-input type="email" label="Username"></lightning-input>
            <lightning-input type="password" label="Password"></lightning-input>

            <lightning-button
            variant="success"
            label="Sign Out"
            title="Sign Out"
            onclick={handleSubmit}
            class="slds-m-left_medium">
        </lightning-button>

            <lightning-button   
            variant="destructive"
            label="Back"
            title="Back"
            onclick={handleClick}
            class="slds-m-left_medium">
        </lightning-button>
        </div>
    </lightning-card>
</template>
