<template>
    <lightning-card title="User Detail Using Wire With Function">
        <div class="slds-m-around_medium">
            <template if:true={userDetail}>
             <p>User Name is {userDetail.Name.value}</p>
             <p>Email is {userDetail.Email.value}</p>
            </template>
        </div>
    </lightning-card>

    <lightning-card title="User Detail Using Wire With Property">
       <div class="slds-m-around_medium">
            <template if:true={userDetail}>
             <p>User Name is {userDetailProperty.data.fields.Name.value}</p>
             <p>Email is {userDetailProperty.data.fields.Email.value}</p>
            </template>
        </div>
    </lightning-card>
</template>
