<template>
    <lightning-card title="Wire Apex Method Property Demo">
        <div class="slds-box slds-m-around_medium">
            <template if:true={accounts.data}>
                <template for:each={accounts.data} for:item="account">
                    <div key={account.Id} class="slds-box slds-m-bottom_x-small">
                       <p><strong>Account Name : </strong>{account.Name}</p>
                        <p><strong>Type : </strong>{account.Type}</p>
                        <p><strong>Industry : </strong>{account.Industry}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>

    <lightning-card title="Wire Apex Method Function Demo">
        <div class="slds-box slds-m-around_medium">
            <template if:true={accountList}>
                <template for:each={accountList} for:item="account">
                    <div key={account.Id} class="slds-box slds-m-bottom_x-small">
                       <p><strong>Account Name : </strong>{account.Name}</p>
                        <p><strong>Type : </strong>{account.typeItem}</p>
                        <p><strong>Industry : </strong>{account.Industry}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
